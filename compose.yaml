services:
  postgres:
    image: postgres:14.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equipment}
      POSTGRES_USER: ${POSTGRES_USER:-equipment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equipment}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
